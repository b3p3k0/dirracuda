name: Promotion Parity Guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  promotion-parity:
    if: github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.ref == 'development'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Write PR body to file
        run: |
          cat <<'EOF' > /tmp/pr_body.txt
          ${{ github.event.pull_request.body }}
          EOF

      - name: Check branch parity and dispositions
        run: |
          python3 scripts/check_branch_parity.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --pr-body /tmp/pr_body.txt \
            --enforce-checklist-markers \
            --require-dispositions
